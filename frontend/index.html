<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Audio Segment Tool</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Syne:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --sand: #d6ac80;
      --crimson: #940000;
      --espresso: #5a4230;
      --ink: #040400;
      --sand-light: #f0dfc4;
      --sand-xlight: #faf4ec;
      --crimson-dark: #6b0000;
      --espresso-light: #8a6347;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Syne', sans-serif; background: #f2ece3; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .shell { background: var(--sand-xlight); border-radius: 24px; padding: 2.5rem 2.5rem 2rem; width: 100%; max-width: 600px; border: 1.5px solid var(--sand); }
    .header { display: flex; align-items: baseline; gap: 10px; margin-bottom: 2rem; }
    .header-title { font-family: 'DM Serif Display', serif; font-size: 24px; color: var(--espresso); letter-spacing: -0.3px; }
    .header-badge { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.2px; color: var(--crimson); background: #f9e5e5; padding: 3px 9px; border-radius: 20px; border: 1px solid #f0c0c0; }
    .drop-zone { background: #fff; border: 2px dashed var(--sand); border-radius: 16px; padding: 2.5rem 1.5rem; text-align: center; cursor: pointer; transition: all 0.2s ease; position: relative; overflow: hidden; }
    .drop-zone:hover, .drop-zone.drag-over { border-color: var(--crimson); background: #fff8f5; }
    .drop-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .drop-icon { width: 52px; height: 52px; background: var(--sand-light); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 14px; }
    .drop-icon svg { width: 26px; height: 26px; stroke: var(--espresso); fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    .drop-title { font-size: 15px; font-weight: 600; color: var(--espresso); margin-bottom: 5px; }
    .drop-sub { font-size: 12px; color: var(--espresso-light); }
    .drop-sub span { color: var(--crimson); font-weight: 500; }
    .file-info { display: none; align-items: center; gap: 12px; background: var(--sand-light); border-radius: 10px; padding: 10px 14px; margin-top: 12px; }
    .file-info.show { display: flex; }
    .file-info-icon { width: 34px; height: 34px; background: var(--espresso); border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .file-info-icon svg { width: 18px; height: 18px; stroke: var(--sand-light); fill: none; stroke-width: 1.8; stroke-linecap: round; }
    .file-name { font-size: 13px; font-weight: 500; color: var(--espresso); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .file-size { font-size: 11px; color: var(--espresso-light); white-space: nowrap; }
    .waveform-row { margin: 1.2rem 0 0; display: none; }
    .waveform-row.show { display: block; }
    .waveform-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--espresso-light); margin-bottom: 8px; }
    .waveform { height: 40px; display: flex; align-items: center; gap: 3px; }
    .waveform-bar { flex: 1; background: var(--sand); border-radius: 2px; animation: wave 1.2s ease-in-out infinite; }
    @keyframes wave { 0%, 100% { opacity: 0.4; transform: scaleY(0.5); } 50% { opacity: 1; transform: scaleY(1); } }
    .divider { height: 1px; background: var(--sand); opacity: 0.4; margin: 1.5rem 0; }
    .minutes-row { display: flex; align-items: center; gap: 10px; margin-bottom: 1.2rem; }
    .minutes-label { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--espresso-light); white-space: nowrap; }
    .minutes-input { width: 70px; padding: 7px 10px; font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 500; color: var(--espresso); background: #fff; border: 1.5px solid var(--sand); border-radius: 8px; outline: none; transition: border-color 0.15s; }
    .minutes-input:focus { border-color: var(--crimson); }
    .minutes-unit { font-size: 12px; color: var(--espresso-light); }
    .seg-bar { flex: 1; height: 6px; background: var(--sand-light); border-radius: 3px; overflow: hidden; }
    .seg-fill { height: 100%; background: linear-gradient(90deg, var(--espresso), var(--crimson)); border-radius: 3px; width: 0%; transition: width 0.4s ease; }
    .btn-row { display: flex; gap: 10px; }
    .btn { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; border-radius: 10px; padding: 10px 20px; transition: all 0.15s ease; border: none; display: flex; align-items: center; gap: 7px; }
    .btn svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .btn-primary { background: var(--crimson); color: #fff; flex: 1; justify-content: center; }
    .btn-primary:hover { background: var(--crimson-dark); transform: translateY(-1px); }
    .btn-primary:active { transform: scale(0.97); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .btn-secondary { background: var(--sand-light); color: var(--espresso); border: 1.5px solid var(--sand); }
    .btn-secondary:hover { background: var(--sand); color: #fff; }
    .btn-secondary:active { transform: scale(0.97); }
    .btn-ghost { background: transparent; color: var(--espresso-light); border: 1.5px solid var(--sand); width: 100%; justify-content: center; margin-top: 10px; font-size: 12px; }
    .btn-ghost:hover { color: var(--espresso); border-color: var(--espresso); }
    .status-bar { display: none; align-items: center; gap: 8px; border-radius: 8px; padding: 8px 12px; margin-top: 10px; font-size: 12px; font-weight: 500; }
    .status-bar.show { display: flex; }
    .status-bar.loading { background: #fff8f5; border: 1px solid #f0c0c0; color: var(--crimson); }
    .status-bar.success { background: #f0faf5; border: 1px solid #9fd4b8; color: #2a6b4a; }
    .status-bar.error   { background: #fff0f0; border: 1px solid #f0b0b0; color: #8b0000; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; animation: pulse 1s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    /* Progress bar */
    .progress-wrap { display: none; height: 6px; background: var(--sand-light); border-radius: 3px; overflow: hidden; margin-top: 10px; }
    .progress-wrap.show { display: block; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--espresso), var(--crimson)); border-radius: 3px; width: 0%; transition: width 0.4s ease; }
    /* Segments list */
    .segments-list { display: none; margin-top: 12px; }
    .segments-list.show { display: block; }
    .segments-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--espresso-light); margin-bottom: 8px; }
    .segment-item { display: flex; align-items: center; justify-content: space-between; background: #fff; border: 1px solid var(--sand); border-radius: 8px; padding: 8px 12px; margin-bottom: 6px; font-size: 12px; color: var(--espresso); }
    .segment-item .seg-range { color: var(--espresso-light); }
    .segment-dl { font-size: 11px; color: var(--crimson); font-weight: 600; cursor: pointer; text-decoration: underline; }
    .segment-dl:hover { color: var(--crimson-dark); }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="shell">
  <div class="header">
    <span class="header-title">Audio Segment</span>
    <span class="header-badge">Tool</span>
  </div>

  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" accept="audio/*" />
    <div class="drop-icon">
      <svg viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
    </div>
    <p class="drop-title" id="dropTitle">Drop audio here</p>
    <p class="drop-sub">or <span>browse your files</span> — mp3, wav, m4a, flac</p>
  </div>

  <div class="file-info" id="fileInfo">
    <div class="file-info-icon">
      <svg viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
    </div>
    <div style="flex:1;overflow:hidden;">
      <p class="file-name" id="fileName">—</p>
      <p class="file-size" id="fileSize">—</p>
    </div>
  </div>

  <div class="waveform-row" id="waveformRow">
    <p class="waveform-label">Waveform preview</p>
    <div class="waveform" id="waveform"></div>
  </div>

  <div class="divider"></div>

  <div class="minutes-row">
    <span class="minutes-label">Segment every</span>
    <input type="number" class="minutes-input" id="minutesInput" value="5" min="1" max="60" />
    <span class="minutes-unit">min</span>
    <div class="seg-bar"><div class="seg-fill" id="segFill"></div></div>
  </div>

  <div class="btn-row">
    <button class="btn btn-secondary" id="downloadBtn" disabled>
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Download All
    </button>
    <button class="btn btn-primary" id="processBtn">
      <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      Process Audio
    </button>
  </div>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <div class="status-bar loading" id="statusBar">
    <div class="status-dot"></div>
    <span id="statusText">Processing…</span>
  </div>

  <div class="segments-list" id="segmentsList">
    <p class="segments-label">Segments</p>
    <div id="segmentsContainer"></div>
  </div>

  <button class="btn btn-ghost" id="refreshBtn">
    <svg style="width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round" viewBox="0 0 24 24">
      <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
    </svg>
    Refresh &amp; upload new
  </button>
</div>

<script>
  // ── CONFIG: point this at your Render backend URL ──────────────────────────
  // When serving index.html FROM FastAPI itself (same domain), use "".
  // When running frontend separately, set your Render URL e.g.:
       const API = "https://audio-segment-tool.onrender.com";
  // ──────────────────────────────────────────────────────────────────────────

  let state = { jobId: null, segments: [], pollTimer: null };

  const $ = id => document.getElementById(id);
  const dropZone          = $('dropZone');
  const fileInput         = $('fileInput');
  const fileInfo          = $('fileInfo');
  const fileName          = $('fileName');
  const fileSize          = $('fileSize');
  const waveformRow       = $('waveformRow');
  const waveform          = $('waveform');
  const minutesInput      = $('minutesInput');
  const segFill           = $('segFill');
  const processBtn        = $('processBtn');
  const downloadBtn       = $('downloadBtn');
  const refreshBtn        = $('refreshBtn');
  const statusBar         = $('statusBar');
  const statusText        = $('statusText');
  const dropTitle         = $('dropTitle');
  const segmentsList      = $('segmentsList');
  const segmentsContainer = $('segmentsContainer');
  const progressWrap      = $('progressWrap');
  const progressFill      = $('progressFill');

  // ── UI helpers ─────────────────────────────────────────────────────────────
  function fmt(bytes) {
    return bytes < 1048576 ? (bytes/1024).toFixed(1)+' KB' : (bytes/1048576).toFixed(1)+' MB';
  }
  function fmtSec(s) {
    return `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;
  }
  function showStatus(msg, type='loading') {
    statusBar.className = `status-bar show ${type}`;
    statusText.textContent = msg;
  }
  function hideStatus() { statusBar.classList.remove('show'); }
  function setProgress(pct) {
    progressWrap.classList.add('show');
    progressFill.style.width = pct + '%';
  }
  function hideProgress() {
    progressWrap.classList.remove('show');
    progressFill.style.width = '0%';
  }
  function setProcessBtn(s) {
    const map = {
      idle:    `<svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg> Process Audio`,
      loading: `<svg viewBox="0 0 24 24" style="animation:spin 1s linear infinite;display:inline-block;width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round"><path d="M21 12a9 9 0 1 1-6.2-8.56"/></svg> Processing…`,
      done:    `<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> Done`,
    };
    processBtn.innerHTML = map[s] || map.idle;
    processBtn.disabled = s === 'loading';
  }
  function buildWaveform() {
    waveform.innerHTML = '';
    for (let i = 0; i < 48; i++) {
      const b = document.createElement('div');
      b.className = 'waveform-bar';
      b.style.cssText = `height:${10+Math.random()*30}px;animation-delay:${(i*0.025).toFixed(3)}s`;
      waveform.appendChild(b);
    }
  }
  function updateSegBar() {
    const v = Math.min(Math.max(parseInt(minutesInput.value)||1,1),60);
    segFill.style.width = Math.round((v/60)*100)+'%';
  }
  minutesInput.addEventListener('input', updateSegBar);
  updateSegBar();

  // ── File handling ──────────────────────────────────────────────────────────
  function handleFile(file) {
    if (!file || !file.type.startsWith('audio/')) {
      showStatus('Please upload a valid audio file.', 'error'); return;
    }
    state.file = file;
    state.jobId = null;
    state.segments = [];
    fileName.textContent = file.name;
    fileSize.textContent = fmt(file.size);
    fileInfo.classList.add('show');
    buildWaveform();
    waveformRow.classList.add('show');
    dropTitle.textContent = 'File loaded';
    segmentsList.classList.remove('show');
    segmentsContainer.innerHTML = '';
    hideStatus();
    hideProgress();
    setProcessBtn('idle');
    downloadBtn.disabled = true;
  }

  fileInput.addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault(); dropZone.classList.remove('drag-over');
    const f = e.dataTransfer.files[0];
    if (f) { fileInput.files = e.dataTransfer.files; handleFile(f); }
  });

  // ── Process: upload → segment → poll ──────────────────────────────────────
  processBtn.addEventListener('click', async () => {
    if (!state.file) { showStatus('Please upload an audio file first.', 'error'); return; }

    setProcessBtn('loading');
    showStatus('Uploading to server…');
    setProgress(5);
    clearInterval(state.pollTimer);

    try {
      // 1. Upload
      const form = new FormData();
      form.append('audio', state.file);
      const upRes = await fetch(`${API}/upload`, { method: 'POST', body: form });
      if (!upRes.ok) throw new Error(`Upload failed: ${upRes.statusText}`);
      const upData = await upRes.json();
      state.jobId = upData.jobId;
      setProgress(15);

      // 2. Start segmentation
      showStatus('Starting segmentation…');
      const segRes = await fetch(`${API}/segment`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          jobId: state.jobId,
          segmentMinutes: parseInt(minutesInput.value) || 5,
        }),
      });
      if (!segRes.ok) throw new Error(`Segment request failed: ${segRes.statusText}`);

      // 3. Poll status
      pollStatus();

    } catch (err) {
      setProcessBtn('idle');
      showStatus('Error: ' + err.message, 'error');
      hideProgress();
    }
  });

  function pollStatus() {
    clearInterval(state.pollTimer);
    state.pollTimer = setInterval(async () => {
      try {
        const res  = await fetch(`${API}/segment/${state.jobId}/status`);
        const data = await res.json();

        setProgress(data.progress || 0);

        if (data.status === 'processing') {
          const labels = {
            10: 'Loading audio…',
            25: 'Reducing noise…',
            40: 'Splitting segments…',
            60: 'Filtering segments…',
            85: 'Building zip…',
          };
          const pct = data.progress || 0;
          const closest = Object.keys(labels).reverse().find(k => pct >= k);
          showStatus(closest ? labels[closest] : 'Processing…');

        } else if (data.status === 'done') {
          clearInterval(state.pollTimer);
          state.segments = data.segments || [];
          setProcessBtn('done');
          showStatus(`${state.segments.length} segment${state.segments.length !== 1 ? 's' : ''} ready`, 'success');
          renderSegments(state.segments);
          downloadBtn.disabled = false;
          hideProgress();

        } else if (data.status === 'error') {
          clearInterval(state.pollTimer);
          setProcessBtn('idle');
          showStatus('Server error: ' + (data.message || 'unknown'), 'error');
          hideProgress();
        }
      } catch (err) {
        clearInterval(state.pollTimer);
        setProcessBtn('idle');
        showStatus('Lost connection to server.', 'error');
        hideProgress();
      }
    }, 1500);
  }

  // ── Render segment list ────────────────────────────────────────────────────
  function renderSegments(segments) {
    segmentsContainer.innerHTML = '';
    segments.forEach(seg => {
      const div = document.createElement('div');
      div.className = 'segment-item';
      div.innerHTML = `
        <span>${seg.label}</span>
        <span class="seg-range">${fmtSec(seg.startSec)} – ${fmtSec(seg.endSec)}</span>
        <a class="segment-dl" href="${API}${seg.downloadUrl}" download>Download</a>`;
      segmentsContainer.appendChild(div);
    });
    segmentsList.classList.add('show');
  }

  // ── Download All ───────────────────────────────────────────────────────────
  downloadBtn.addEventListener('click', () => {
    if (!state.jobId || !state.segments.length) return;
    const a = document.createElement('a');
    a.href = `${API}/segment/${state.jobId}/download-all`;
    a.download = 'segments.zip';
    a.click();
  });

  // ── Refresh ────────────────────────────────────────────────────────────────
  refreshBtn.addEventListener('click', async () => {
    clearInterval(state.pollTimer);
    // Clean up server-side job
    if (state.jobId) {
      fetch(`${API}/segment/${state.jobId}`, { method: 'DELETE' }).catch(() => {});
    }
    state = { jobId: null, segments: [], pollTimer: null };
    fileInput.value = '';
    fileInfo.classList.remove('show');
    waveformRow.classList.remove('show');
    segmentsList.classList.remove('show');
    segmentsContainer.innerHTML = '';
    waveform.innerHTML = '';
    hideStatus();
    hideProgress();
    dropTitle.textContent = 'Drop audio here';
    minutesInput.value = 5;
    updateSegBar();
    setProcessBtn('idle');
    downloadBtn.disabled = true;
  });
</script>
</body>
</html>
